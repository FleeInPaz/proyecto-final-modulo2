<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Feria Online | Frutas Frescas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/app.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-success shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center fw-bold" href="#">
                <img src="img/logo.png" alt="Logo" width="30" height="30" class="me-2">
                Feria Limache
            </a>
            <div class="ms-auto">
                <button class="btn btn-warning position-relative fw-bold" data-bs-toggle="modal" data-bs-target="#cartModal">
                    🛒 Mi Canasta
                    <span id="cart-count" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                        0
                    </span>
                </button>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <header class="text-center mb-5">
            <h1 class="display-5 fw-bold text-success">Nuestra Cosecha</h1>
            <p class="text-muted">Productos frescos de la zona directo a tu casa.</p>
        </header>

        <section id="product-grid" class="row g-4">
            </section>
    </main>

    <footer class="bg-dark text-white py-4 mt-5">
        <div class="container text-center">
            <p class="mb-0 small text-secondary">© 2026 Frutas de calidad a la puerta de su casa</p>
        </div>
    </footer>

    <div class="modal fade" id="cartModal" tabindex="-1" aria-labelledby="cartModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title" id="cartModalLabel">Resumen de Compra</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <ul id="cart-list" class="list-group mb-3">
                        </ul>
                    
                    <div class="border-top pt-3">
                        <p class="d-flex justify-content-between mb-1">
                            <span>Subtotal:</span> 
                            <span id="subtotal">$0</span>
                        </p>
                        <p class="d-flex justify-content-between text-muted mb-1 small">
                            <span>IVA (19%):</span> 
                            <span id="tax">$0</span>
                        </p>
                        <hr>
                        <h4 class="d-flex justify-content-between fw-bold text-success">
                            <span>Total:</span> 
                            <span id="total">$0</span>
                        </h4>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Seguir comprando</button>
                    <button type="button" class="btn btn-success px-4" onclick="finalizarCompra()">Finalizar Compra</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/app.js"></script>
</body>
</html>
